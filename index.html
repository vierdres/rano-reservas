<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rano Café — Control de Reservas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --arena:       #F5EDD6;
    --arena-dark:  #EAD9B4;
    --arena-deep:  #D4BF95;
    --piedra:      #3D2B1F;
    --piedra-light:#5C4033;
    --verde:       #4A7C59;
    --terracota:   #C4622D;
    --terracota-dk:#A8521F;
    --cielo:       #5B8DB8;
    --blanco:      #FEFBF4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--arena);
    font-family: 'Inter', sans-serif;
    color: var(--piedra);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  header {
    background: var(--piedra);
    padding: 0 32px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--terracota);
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .logo-img { height: 46px; width: auto; flex-shrink: 0; display: block; }

  .header-subtitle {
    font-size: 0.68rem;
    color: #A89070;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 400;
    white-space: nowrap;
  }

  .header-right { display: flex; align-items: center; gap: 20px; }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.78rem;
    color: #C8B89A;
  }
  .stat-pill strong {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--terracota);
    line-height: 1;
  }
  .header-stats { display: flex; align-items: center; gap: 12px; }

  .clock-time {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--arena);
    line-height: 1;
    letter-spacing: 0.02em;
    text-align: right;
  }
  .clock-date {
    font-size: 0.65rem;
    color: #A89070;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
    text-align: right;
  }

  /* MAIN */
  main { max-width: 1140px; margin: 0 auto; padding: 28px 24px 64px; }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #A89070; pointer-events: none; }
  #search-input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    background: rgba(61,43,31,0.06);
    border: 1.5px solid var(--arena-deep);
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    color: var(--piedra);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #search-input::placeholder { color: #A89070; }
  #search-input:focus { border-color: var(--terracota); background: var(--blanco); }

  .btn {
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    letter-spacing: 0.02em;
    transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--terracota); color: white; box-shadow: 0 2px 8px rgba(196,98,45,0.3); }
  .btn-primary:hover { background: var(--terracota-dk); box-shadow: 0 4px 12px rgba(196,98,45,0.4); }
  .btn-secondary { background: var(--verde); color: white; }
  .btn-secondary:hover { background: #3A6347; }
  .btn-ghost { background: transparent; color: var(--piedra-light); border: 1.5px solid var(--arena-deep); }
  .btn-ghost:hover { background: var(--arena-dark); }
  .btn-danger { background: transparent; color: #C05040; border: 1.5px solid #D0806A; }
  .btn-danger:hover { background: #FCEAE0; }

  /* SORT BAR */
  .sort-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; font-size: 0.76rem; color: #8A7060; }
  .sort-bar span { letter-spacing: 0.06em; text-transform: uppercase; }
  .sort-btn {
    background: none; border: 1px solid var(--arena-deep); border-radius: 4px;
    padding: 3px 9px; font-size: 0.73rem; font-family: 'Inter', sans-serif;
    color: var(--piedra-light); cursor: pointer; transition: all 0.15s;
  }
  .sort-btn:hover, .sort-btn.active { background: var(--piedra); color: var(--arena); border-color: var(--piedra); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 72px 24px; color: #8A7060; display: none; }
  .empty-state.visible { display: block; }
  .empty-state svg { margin-bottom: 18px; opacity: 0.35; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #7A6050; margin-bottom: 6px; }
  .empty-state p { font-size: 0.88rem; font-style: italic; color: #A89070; }

  /* GRID */
  #reservas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 18px; align-items: start; }

  /* CARD */
  .reserva-card {
    background: var(--piedra);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 3px 14px rgba(61,43,31,0.2);
    transition: transform 0.18s, box-shadow 0.18s, opacity 0.2s;
    animation: cardIn 0.28s ease both;
    cursor: grab;
  }
  .reserva-card:active { cursor: grabbing; }
  .reserva-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(61,43,31,0.28); }
  .reserva-card.dragging { opacity: 0.45; transform: scale(0.97); cursor: grabbing; }
  .reserva-card.drag-over { box-shadow: 0 0 0 2px var(--terracota), 0 8px 24px rgba(196,98,45,0.25); }
  .reserva-card.removing { animation: cardOut 0.22s ease forwards; }

  @keyframes cardIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes cardOut { to { opacity: 0; transform: scale(0.94); } }

  .card-header {
    background: var(--piedra-light);
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2.5px solid var(--terracota);
  }
  .card-num {
    width: 26px; height: 26px; background: var(--terracota); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 0.88rem; color: white; font-weight: 700; flex-shrink: 0;
  }
  .card-agency { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--arena); font-weight: 700; flex: 1; line-height: 1.2; }
  .card-hora { font-size: 0.7rem; color: #A89070; letter-spacing: 0.05em; display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-icon {
    background: transparent; border: none; cursor: pointer; color: #8A7060;
    padding: 5px; border-radius: 5px; transition: color 0.15s, background 0.15s; display: flex; align-items: center;
  }
  .btn-icon:hover { color: var(--arena); background: rgba(255,255,255,0.1); }
  .btn-icon.delete:hover { color: #E07070; background: rgba(224,112,112,0.1); }

  .card-body { padding: 13px 14px; }

  .grupo-item {
    background: rgba(255,255,255,0.05); border-radius: 7px; padding: 10px 12px;
    margin-bottom: 8px; border-left: 3px solid transparent;
  }
  .grupo-item:last-child { margin-bottom: 0; }
  .grupo-item.incluido { border-left-color: var(--verde); }
  .grupo-item.directo  { border-left-color: var(--cielo); }

  .grupo-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .grupo-info { flex: 1; }
  .info-line { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; margin-bottom: 2px; }
  .info-line .label { color: #7A6850; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; width: 42px; flex-shrink: 0; }
  .info-line .value { color: var(--arena-dark); font-weight: 500; }

  .grupo-right { text-align: right; flex-shrink: 0; }
  .mesa-badge { display: inline-block; background: var(--terracota); color: white; border-radius: 4px; padding: 2px 7px; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 4px; }
  .pax-num { display: block; color: var(--arena); font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; line-height: 1; }
  .pax-label { font-size: 0.6rem; color: #8A7060; text-transform: uppercase; letter-spacing: 0.08em; }
  .pago-badge { display: inline-flex; align-items: center; border-radius: 3px; padding: 2px 7px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.06em; margin-top: 5px; }
  .pago-badge.incluido { background: rgba(74,124,89,0.22); color: #7DC896; }
  .pago-badge.directo  { background: rgba(91,141,184,0.22); color: #8EC4E8; }

  /* ESTADO BADGES */
  .estado-btn {
    display: inline-flex; align-items: center; gap: 5px;
    border: none; border-radius: 20px; padding: 4px 11px;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.18s; font-family: 'Inter', sans-serif;
    text-transform: uppercase; flex-shrink: 0;
  }
  .estado-btn.pendiente  { background: rgba(200,60,60,0.18); color: #E06060; border: 1.5px solid #E06060; }
  .estado-btn.en_mesa   { background: rgba(210,170,20,0.18); color: #C8A800; border: 1.5px solid #C8A800; }
  .estado-btn.finalizado { background: rgba(74,124,89,0.18); color: #5AAA70; border: 1.5px solid #5AAA70; }
  .estado-btn:hover { filter: brightness(1.15); }

  .reserva-card.pendiente  { border-left: 4px solid #E06060; }
  .reserva-card.en_mesa   { border-left: 4px solid #C8A800; }
  .reserva-card.finalizado { border-left: 4px solid #5AAA70; opacity: 0.75; }

  .notas-line { font-size: 0.73rem; color: #A89070; font-style: italic; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.06); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(20,10,5,0.72);
    z-index: 200; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.18s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--blanco); border-radius: 14px; width: 100%; max-width: 560px;
    max-height: 92vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.45); animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    background: var(--piedra); padding: 17px 22px; display: flex; align-items: center;
    justify-content: space-between; border-radius: 14px 14px 0 0; border-bottom: 3px solid var(--terracota);
    position: sticky; top: 0; z-index: 1;
  }
  .modal-header h2 { font-family: 'Playfair Display', serif; color: var(--arena); font-size: 1.1rem; }
  .modal-close {
    background: transparent; border: none; color: #A89070; cursor: pointer;
    padding: 4px; border-radius: 5px; display: flex; align-items: center; transition: color 0.15s, background 0.15s;
  }
  .modal-close:hover { color: var(--arena); background: rgba(255,255,255,0.1); }

  .modal-body { padding: 22px; }

  .form-section-label {
    font-size: 0.68rem; font-weight: 600; color: #A89070; letter-spacing: 0.14em;
    text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 7px;
  }
  .form-section-label::after { content: ''; flex: 1; height: 1px; background: var(--arena-deep); }

  label { display: block; font-size: 0.73rem; font-weight: 600; color: #5C4033; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .form-group { margin-bottom: 14px; }

  input[type="text"], input[type="number"], input[type="time"], select, textarea {
    width: 100%; padding: 9px 12px; border: 1.5px solid #D4C4A8; border-radius: 7px;
    font-family: 'Inter', sans-serif; font-size: 0.88rem; color: var(--piedra); background: white;
    transition: border-color 0.18s, box-shadow 0.18s; outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--terracota); box-shadow: 0 0 0 3px rgba(196,98,45,0.12); }

  .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .grupos-section { border: 1.5px dashed #D4C4A8; border-radius: 9px; padding: 14px; margin-bottom: 14px; background: #FAF5EC; }

  .grupo-form { background: white; border-radius: 7px; padding: 13px; margin-bottom: 10px; border: 1px solid #E4D8BE; }

  .grupo-form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .grupo-form-title { font-size: 0.74rem; font-weight: 600; color: var(--piedra-light); text-transform: uppercase; letter-spacing: 0.07em; }
  .btn-remove-grupo {
    background: transparent; border: none; color: #C08060; cursor: pointer; font-size: 0.75rem;
    padding: 2px 7px; border-radius: 4px; transition: all 0.15s; display: flex; align-items: center; gap: 3px;
  }
  .btn-remove-grupo:hover { background: #FCEAE0; color: var(--terracota); }

  .btn-add-grupo {
    background: transparent; border: 1.5px dashed #B8A888; color: #8A7060; padding: 8px 14px;
    border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer;
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.18s; margin-top: 2px;
  }
  .btn-add-grupo:hover { border-color: var(--terracota); color: var(--terracota); background: #FEF8F2; }

  .modal-footer {
    padding: 15px 22px; border-top: 1px solid #E4D8BE; display: flex; gap: 10px; justify-content: flex-end;
    position: sticky; bottom: 0; background: var(--blanco); border-radius: 0 0 14px 14px;
  }

  /* CONFIRM DIALOG */
  .confirm-overlay {
    display: none; position: fixed; inset: 0; background: rgba(20,10,5,0.65);
    z-index: 300; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(2px);
  }
  .confirm-overlay.open { display: flex; animation: fadeIn 0.15s ease; }
  .confirm-box {
    background: var(--blanco); border-radius: 12px; padding: 28px 28px 22px;
    max-width: 360px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); animation: slideUp 0.18s ease; text-align: center;
  }
  .confirm-icon {
    width: 48px; height: 48px; background: #FCEAE0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; color: var(--terracota);
  }
  .confirm-box h3 { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--piedra); margin-bottom: 6px; }
  .confirm-box p  { font-size: 0.84rem; color: #7A6050; margin-bottom: 20px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; justify-content: center; }

  /* TOAST */
  #toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 500; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast {
    background: var(--piedra); color: var(--arena); padding: 11px 16px; border-radius: 8px;
    font-size: 0.83rem; font-weight: 500; display: flex; align-items: center; gap: 9px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3); animation: toastIn 0.25s ease;
    border-left: 3px solid var(--terracota); pointer-events: all; min-width: 220px;
  }
  .toast.success { border-left-color: var(--verde); }
  .toast.error   { border-left-color: #C05040; }
  .toast.info    { border-left-color: var(--cielo); }

  @keyframes toastIn  { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastOut { to   { transform: translateX(20px); opacity: 0; } }

  /* HISTORIAL OVERLAY */
  .historial-overlay {
    display: none; position: fixed; inset: 0; background: rgba(20,10,5,0.72);
    z-index: 200; align-items: flex-start; justify-content: center; padding: 32px 16px; overflow-y: auto;
  }
  .historial-overlay.open { display: flex; animation: fadeIn 0.18s ease; }
  .historial-panel {
    background: var(--blanco); border-radius: 14px; width: 100%; max-width: 700px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.35); overflow: hidden; margin: auto;
  }
  .historial-header {
    background: var(--piedra); padding: 18px 24px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid var(--terracota);
  }
  .historial-header h2 { font-family: 'Playfair Display', serif; color: var(--arena); font-size: 1.2rem; margin: 0; }
  .historial-body { padding: 20px 24px; max-height: 70vh; overflow-y: auto; }
  .historial-empty { text-align: center; padding: 40px 0; color: #8A7060; font-style: italic; font-size: 0.9rem; }
  .dia-entry { border: 1.5px solid var(--arena-deep); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .dia-header { display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: var(--arena-dark); cursor: pointer; user-select: none; transition: background 0.15s; }
  .dia-header:hover { background: var(--arena-deep); }
  .dia-fecha { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--piedra); font-weight: 700; flex: 1; }
  .dia-stats { font-size: 0.75rem; color: var(--piedra-light); display: flex; gap: 12px; }
  .dia-stat { display: flex; align-items: center; gap: 4px; }
  .dia-chevron { color: #8A7060; transition: transform 0.2s; flex-shrink: 0; }
  .dia-entry.expanded .dia-chevron { transform: rotate(180deg); }
  .dia-detail { display: none; padding: 12px 16px; background: var(--blanco); border-top: 1px solid var(--arena-deep); }
  .dia-entry.expanded .dia-detail { display: block; }
  .dia-reserva-item { padding: 7px 10px; border-radius: 6px; margin-bottom: 6px; background: var(--arena); display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
  .dia-reserva-item:last-child { margin-bottom: 0; }
  .dia-reserva-num { width: 20px; height: 20px; background: var(--terracota); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; font-weight: 700; flex-shrink: 0; }
  .dia-reserva-name { flex: 1; color: var(--piedra); font-weight: 600; }
  .dia-reserva-info { color: #7A6050; font-size: 0.75rem; }
  .dia-actions { display: flex; justify-content: flex-end; padding: 10px 16px; background: var(--arena-dark); border-top: 1px solid var(--arena-deep); }
  .btn-eliminar-dia { background: transparent; border: 1.5px solid #D0806A; color: #C05040; border-radius: 6px; padding: 6px 14px; font-size: 0.78rem; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .btn-eliminar-dia:hover { background: #FCEAE0; }

  /* PRINT */
  @media print {
    header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .toolbar, .sort-bar, .card-actions, .modal-overlay, #toast-container { display: none !important; }
    .reserva-card { break-inside: avoid; }
    body { background: white; }
    #reservas-grid { display: block; }
    .reserva-card { margin-bottom: 12px; box-shadow: none; border: 1px solid #ccc; }
  }

  /* RESPONSIVE */
  @media (max-width: 620px) {
    header { padding: 0 14px; height: 60px; }
    .header-stats { display: none; }
    main { padding: 16px 12px 48px; }
    .form-row-3 { grid-template-columns: 1fr 1fr; }
    #toast-container { bottom: 16px; right: 12px; left: 12px; }
    .toast { min-width: auto; }
  }
</style>
</head>
<body>

<main>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="abrirModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Nueva Reserva
    </button>

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.6"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Buscar agencia…" oninput="filtrarReservas()" autocomplete="off">
    </div>

    <button class="btn btn-secondary" onclick="exportarTexto()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 10v3h10v-3" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 2v7M5 6l3 3 3-3" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Exportar .txt
    </button>

    <button class="btn btn-ghost" onclick="copiarAlPortapapeles()" title="Copiar resumen al portapapeles">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="5" y="1" width="9" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 4v10a1.5 1.5 0 001.5 1.5H11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Copiar
    </button>

    <button class="btn btn-ghost" onclick="confirmarLimpiar()" style="margin-left:auto">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Limpiar día
    </button>

    <button class="btn btn-ghost" id="btn-historial" onclick="abrirHistorial()" style="border-color:var(--cielo);color:var(--cielo)">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Historial
    </button>
  </div>

  <div class="sort-bar" id="sort-bar" style="display:none">
    <span>Ordenar:</span>
    <button class="sort-btn active" onclick="cambiarOrden(this,'manual')">Manual</button>
    <button class="sort-btn" onclick="cambiarOrden(this,'nombre')">A–Z</button>
    <button class="sort-btn" onclick="cambiarOrden(this,'hora')">Por hora</button>
    <button class="sort-btn" onclick="cambiarOrden(this,'pax')">Mayor pax</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nueva Reserva</h2>
      <button class="modal-close" onclick="cerrarModal()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="4" y1="4" x2="14" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="4" x2="4" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-section-label">Agencia</div>
      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group" style="margin-bottom:0">
          <label>Nombre de agencia / operador</label>
          <input type="text" id="f-agencia" placeholder="Ej: Hotumatur, Aku-Aku…" autocomplete="off">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Hora estimada de llegada</label>
          <input type="time" id="f-hora">
        </div>
      </div>

      <div class="form-section-label">Grupos</div>
      <div class="grupos-section">
        <div id="grupos-container"></div>
        <button class="btn-add-grupo" onclick="agregarGrupo()">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Agregar grupo
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>

function toast(msg, tipo = 'success', ms = 3200) {
  const icons = {
    success:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 3" stroke="#7DC896" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    error:  '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="3" y1="3" x2="11" y2="11" stroke="#E07070" stroke-width="2" stroke-linecap="round"/><line x1="11" y1="3" x2="3" y2="11" stroke="#E07070" stroke-width="2" stroke-linecap="round"/></svg>',
    info:   '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#8EC4E8" stroke-width="1.5"/><line x1="7" y1="6" x2="7" y2="10" stroke="#8EC4E8" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="4.5" r="0.7" fill="#8EC4E8"/></svg>',
  };
  const el = document.createElement('div');
  el.className = `toast ${tipo}`;
  el.innerHTML = `${icons[tipo]||''}<span>${msg}</span>`;

    el.style.animation = 'toastOut 0.22s ease forwards';

}

function abrirConfirm(titulo, msg, cb) {
  document.getElementById('confirm-title').textContent = titulo;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirm-overlay').classList.add('open');
}
function cerrarConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmCallback = null;
}
document.getElementById('confirm-ok-btn').addEventListener('click', () => {
  if (confirmCallback) confirmCallback();
  cerrarConfirm();
});

function paxTotal(r) { return r.grupos.reduce((s,g) => s + (parseInt(g.pax)||0), 0); }

function getOrdenadas() {
  const q = (document.getElementById('search-input').value||'').toLowerCase().trim();
  let lista = q ? reservas.filter(r => r.agencia.toLowerCase().includes(q)) : [...reservas];
  if (ordenActual === 'nombre') lista.sort((a,b) => a.agencia.localeCompare(b.agencia));
  if (ordenActual === 'hora')   lista.sort((a,b) => (a.hora||'99:99').localeCompare(b.hora||'99:99'));
  if (ordenActual === 'pax')    lista.sort((a,b) => paxTotal(b) - paxTotal(a));
  return lista;
}

function estadoLabel(e) {
  if (e === 'pendiente')  return '● Pendiente';
  if (e === 'en_mesa')   return '● En mesa';
  if (e === 'finalizado') return '● Finalizado';
  return '● Pendiente';
}

function cambiarEstado(id) {
  const res = reservas.find(r => r.id === id);
  if (!res) return;
  const ciclo = { pendiente: 'en_mesa', en_mesa: 'finalizado', finalizado: 'pendiente' };
  res.estado = ciclo[res.estado || 'pendiente'];
  guardarStorage();
  render();
}

function render() {
  const grid  = document.getElementById('reservas-grid');
  const empty = document.getElementById('empty-msg');
  const sortBar = document.getElementById('sort-bar');

  const totPax = reservas.reduce((s,r) => s + paxTotal(r), 0);
  document.getElementById('total-pax').textContent = totPax;
  document.getElementById('total-reservas').textContent = reservas.length;

  grid.innerHTML = '';

  if (reservas.length === 0) {
    empty.classList.add('visible');
    sortBar.style.display = 'none';
    return;
  }
  empty.classList.remove('visible');
  sortBar.style.display = reservas.length > 1 ? 'flex' : 'none';

  const lista = getOrdenadas();

  if (lista.length === 0) {
    const el = document.createElement('div');
    el.style.cssText = 'grid-column:1/-1;text-align:center;padding:40px;color:#8A7060;font-style:italic;font-size:0.9rem;';
    el.textContent = 'Ninguna reserva coincide con la búsqueda.';
    grid.appendChild(el);
    return;
  }

  lista.forEach((res, idx) => {
    const card = document.createElement('div');
    card.className = `reserva-card ${res.estado || 'pendiente'}`;
    card.dataset.id = res.id;
    card.draggable = ordenActual === 'manual';

    card.addEventListener('dragstart', e => { dragSrcId = card.dataset.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; if(card.dataset.id!==dragSrcId) card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('dragend',   () => { card.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over')); });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const si = reservas.findIndex(r=>r.id===dragSrcId);
      const ti = reservas.findIndex(r=>r.id===card.dataset.id);
      if (si>-1 && ti>-1 && si!==ti) {
        const [m] = reservas.splice(si,1);
        reservas.splice(ti,0,m);
        guardarStorage();
        render();
      }
    });

    const gruposHtml = res.grupos.map(g => {
      const cls = g.pago==='incluido' ? 'incluido' : 'directo';
      return `<div class="grupo-item ${cls}">
        <div class="grupo-row">
          <div class="grupo-info">
            ${g.guia   ? `<div class="info-line"><span class="label">Guía</span><span class="value">${g.guia}</span></div>` : ''}
            ${g.driver ? `<div class="info-line"><span class="label">Driver</span><span class="value">${g.driver}</span></div>` : ''}
            <span class="pago-badge ${cls}">${g.pago==='incluido'?'INCLUIDO':'PAGO DIRECTO'}</span>
          </div>
          <div class="grupo-right">
            ${g.mesas ? `<span class="mesa-badge">Mesa ${g.mesas}</span>` : ''}
            <span class="pax-num">${g.pax||0}</span>
            <span class="pax-label">pax</span>
          </div>
        </div>
        ${g.notas ? `<div class="notas-line">📝 ${g.notas}</div>` : ''}
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">${idx+1}</span>
        <div class="card-agency">${res.agencia}</div>
        ${res.hora ? `<span class="card-hora"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M6 3.5v2.75L7.75 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>${res.hora}</span>` : ''}
        <button class="estado-btn ${res.estado||'pendiente'}" onclick="cambiarEstado('${res.id}')" title="Cambiar estado">
          ${estadoLabel(res.estado||'pendiente')}
        </button>
        <div class="card-actions">
          <button class="btn-icon" onclick="abrirModal('${res.id}')" title="Editar">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 11.5V14h2.5l7-7L9 4.5l-7 7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M11.5 2.5l2 2-1 1-2-2 1-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
          <button class="btn-icon delete" onclick="pedirEliminar('${res.id}')" title="Eliminar">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="card-body">${gruposHtml}</div>`;

    grid.appendChild(card);
  });
}

function removeGrupo(idx) {
  const el = document.querySelector(`.grupo-form[data-gidx="${idx}"]`);
  if (el) el.remove();
}

function guardarReserva() {
  const agencia = document.getElementById('f-agencia').value.trim();
  if (!agencia) { toast('Ingresa el nombre de la agencia.', 'error'); return; }

  const gruposEls = document.querySelectorAll('.grupo-form');
  if (!gruposEls.length) { toast('Agrega al menos un grupo.', 'error'); return; }

  let valido = true;
  const grupos = [];
  gruposEls.forEach(el => {
    const get = f => el.querySelector(`[data-field="${f}"]`).value.trim();
    const pax = parseInt(get('pax'));
    if (!pax || pax < 1) valido = false;
    grupos.push({ guia:get('guia'), driver:get('driver'), pax:pax||0, pago:get('pago'), mesas:get('mesas'), notas:get('notas') });
  });
  if (!valido) { toast('Todos los grupos deben tener al menos 1 pax.', 'error'); return; }

  const hora = document.getElementById('f-hora').value;

  if (editandoId) {
    const i = reservas.findIndex(r => r.id === editandoId);
    reservas[i] = { ...reservas[i], agencia, hora, grupos };
    toast(`Reserva de ${agencia} actualizada.`, 'info');
  } else {
    reservas.push({ id: Date.now().toString(), agencia, hora, grupos, estado: 'pendiente' });
    toast(`Reserva de ${agencia} registrada.`);
  }

  guardarStorage();
  cerrarModal();
  render();
}

function pedirEliminar(id) {
  const res = reservas.find(r => r.id === id);
  abrirConfirm(
    '¿Eliminar reserva?',
    `Se eliminará la reserva de "${res.agencia}". Esta acción no se puede deshacer.`,
    () => {
      const card = document.querySelector(`.reserva-card[data-id="${id}"]`);
      if (card) {
        card.classList.add('removing');
        setTimeout(() => { reservas = reservas.filter(r => r.id !== id); guardarStorage(); render(); }, 220);
      } else {
        reservas = reservas.filter(r => r.id !== id); guardarStorage(); render();
      }
      toast(`Reserva de ${res.agencia} eliminada.`, 'error');
    }
  );
}

function confirmarLimpiar() {
  if (!reservas.length) { toast('No hay reservas para limpiar.', 'info'); return; }
  abrirConfirm(
    '\u00BFLimpiar el d\u00EDa?',
    `Las ${reservas.length} reserva${reservas.length>1?'s':''} se guardar\u00E1n en el historial y se limpiar\u00E1 el d\u00EDa.`,
    () => { archivarDia(); reservas = []; guardarStorage(); render(); toast('D\u00EDa guardado en el historial.', 'info'); }
  );
}

function archivarDia() {
  if (!reservas.length) return;
  const now = new Date();
  const fechaLabel = `${DIAS[now.getDay()]} ${now.getDate()} de ${MESES[now.getMonth()]} ${now.getFullYear()}`;
  const hora = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const totalPax = reservas.reduce((s,r) => s + paxTotal(r), 0);
  const entrada = { id: Date.now().toString(), fechaLabel, hora, totalPax, totalReservas: reservas.length, reservas: JSON.parse(JSON.stringify(reservas)) };
  historial.unshift(entrada);
  supabaseClient.from('historial').insert({ id: entrada.id, fecha_label: entrada.fechaLabel, hora: entrada.hora, total_pax: entrada.totalPax, total_reservas: entrada.totalReservas, reservas: entrada.reservas });
}

function abrirHistorial() { renderHistorial(); document.getElementById('historial-overlay').classList.add('open'); }
function cerrarHistorial() { document.getElementById('historial-overlay').classList.remove('open'); }

  const body = document.getElementById('historial-body');
  if (!historial.length) { body.innerHTML = '<div class="historial-empty">No hay d\u00EDas anteriores guardados.<br>Al limpiar el d\u00EDa, las reservas se archivan aqu\u00ED autom\u00E1ticamente.</div>'; return; }
  body.innerHTML = historial.map(dia => `
    <div class="dia-entry" id="dia-${dia.id}">

        <div class="dia-stats">
          <span class="dia-stat"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1" y="3" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 3V1.5M8 3V1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>${dia.totalReservas} reserva${dia.totalReservas!==1?'s':''}</span>
          <span class="dia-stat"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="4" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 10.5c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>${dia.totalPax} pax</span>
        </div>
        <svg class="dia-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="dia-detail">${dia.reservas.map((r,i) => `<div class="dia-reserva-item"><span class="dia-reserva-num">${i+1}</span><span class="dia-reserva-name">${r.agencia}</span><span class="dia-reserva-info">${r.hora ? '\u23F0 '+r.hora+'  ':''} ${paxTotal(r)} pax</span></div>`).join('')}</div>
      <div class="dia-actions"><button class="btn-eliminar-dia" onclick="confirmarEliminarDia('${dia.id}')"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Eliminar este d\u00EDa</button></div>
    </div>`).join('');
}

function toggleDia(id) { document.getElementById('dia-'+id).classList.toggle('expanded'); }

function confirmarEliminarDia(id) {
  const dia = historial.find(d => d.id === id);
  abrirConfirm('\u00BFEliminar del historial?', `Se eliminar\u00E1 el registro del ${dia.fechaLabel}.`, () => {
    historial = historial.filter(d => d.id !== id);
    supabaseClient.from('historial').delete().eq('id', id);
    renderHistorial();
    toast('D\u00EDa eliminado del historial.', 'error');
  });
}

async function cargarDatos() {
  const { data: estado } = await supabaseClient.from('estado').select('reservas').eq('id', 1).single();
  reservas = estado?.reservas || [];
  const { data: histData } = await supabaseClient.from('historial').select('*').order('created_at', { ascending: false });
  historial = (histData || []).map(h => ({ id: h.id, fechaLabel: h.fecha_label, hora: h.hora, totalPax: h.total_pax, totalReservas: h.total_reservas, reservas: h.reservas }));
  render();
}

function guardarStorage() { supabaseClient.from('estado').upsert({ id: 1, reservas: reservas, updated_at: new Date().toISOString() }); }

function construirTexto() {
  const now = new Date();
  const fecha = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  const tot = reservas.reduce((s,r) => s + paxTotal(r), 0);
  let txt = `RANO CAFÉ — RESERVAS ${fecha}\n${'═'.repeat(44)}\n\n`;
  reservas.forEach((res,i) => {
    txt += `${i+1}. ${res.agencia.toUpperCase()}${res.hora ? '  ⏰ ' + res.hora : ''}\n`;
    res.grupos.forEach((g,gi) => {
      if (res.grupos.length > 1) txt += `   ── Grupo ${gi+1}\n`;
      if (g.guia)   txt += `   Guía:   ${g.guia}\n`;
      if (g.driver) txt += `   Driver: ${g.driver}\n`;
      txt += `   Pax:    ${g.pax}\n`;
      txt += `   Pago:   ${g.pago==='incluido' ? 'INCLUIDO (agencia)' : 'Pago directo'}\n`;
      if (g.mesas)  txt += `   Mesa:   ${g.mesas}\n`;
      if (g.notas)  txt += `   Notas:  ${g.notas}\n`;
    });
    txt += '\n';
  });
  txt += `${'─'.repeat(44)}\nTOTAL PAX: ${tot}\n`;
  return { txt, fecha };
}

function exportarTexto() {
  if (!reservas.length) { toast('No hay reservas para exportar.', 'info'); return; }
  const { txt, fecha } = construirTexto();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type:'text/plain;charset=utf-8' }));
  a.download = `reservas_${fecha.replace(/\//g,'_')}.txt`;
  a.click();
  toast('Archivo descargado.');
}

function copiarAlPortapapeles() {
  if (!reservas.length) { toast('No hay reservas para copiar.', 'info'); return; }
  const { txt } = construirTexto();
  navigator.clipboard.writeText(txt)
    .then(() => toast('Resumen copiado al portapapeles.'))
    .catch(() => toast('No se pudo copiar. Usa Exportar.', 'error'));
}

document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) cerrarModal(); });
document.getElementById('confirm-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) cerrarConfirm(); });
document.getElementById('historial-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) cerrarHistorial(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { cerrarModal(); cerrarConfirm(); cerrarHistorial(); }
  if ((e.metaKey||e.ctrlKey) && e.key === 'n') { e.preventDefault(); abrirModal(); }
});

cargarDatos();
</script>
</body>
</html>
